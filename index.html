<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Transmission</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff88;
    font-family: "Courier New", monospace;
    overflow: hidden;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    text-align: center;
}

.hidden {
    display: none;
}

.glitch {
    font-size: 3rem;
    animation: glitch 1s infinite;
}

@keyframes glitch {
    0% { text-shadow: 2px 0 red, -2px 0 blue; }
    50% { text-shadow: -2px 0 red, 2px 0 blue; }
    100% { text-shadow: 2px 0 red, -2px 0 blue; }
}

.spinner {
    border: 6px solid rgba(0,255,136,0.2);
    border-top: 6px solid #00ff88;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    animation: spin 1s linear infinite;
    margin: 30px 0;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.terminal {
    font-size: 1.2rem;
    margin-top: 20px;
    min-height: 80px;
}

video {
    max-width: 80%;
    border: 2px solid #00ff88;
    box-shadow: 0 0 20px #00ff88;
}

.scanline {
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(0,255,136,0.03) 3px
    );
    pointer-events: none;
}
</style>
</head>
<body>

<div class="container" id="bootSequence">
    <div class="glitch">UNAUTHORIZED SIGNAL DETECTED</div>
    <div class="spinner"></div>
    <div class="terminal" id="terminal"></div>
</div>

<div class="container hidden" id="videoContainer">
    <div class="glitch">SECURE TRANSMISSION READY</div>
    <p>Agent authentication required. Press play.</p>
    <video controls>
        <source src="mission.mp4" type="video/mp4">
        Din browser understøtter ikke video.
    </video>
</div>

<div class="scanline"></div>

<script>

const messages = [
">>> Establishing encrypted tunnel...",
">>> AES-256 handshake initiated...",
">>> Routing via secure proxy...",
">>> Internal systems compromised...",
">>> Switching to visual protocol...",
">>> Awaiting agent authentication..."
];

let terminal = document.getElementById("terminal");
let msgIndex = 0;
let charIndex = 0;

function typeWriter() {
    if (msgIndex < messages.length) {
        if (charIndex < messages[msgIndex].length) {
            terminal.innerHTML += messages[msgIndex].charAt(charIndex);
            charIndex++;
            setTimeout(typeWriter, 30);
        } else {
            terminal.innerHTML += "<br>";
            msgIndex++;
            charIndex = 0;
            setTimeout(typeWriter, 400);
        }
    }
}

typeWriter();

// 60 sekunders boot sequence
setTimeout(() => {
    document.getElementById("bootSequence").classList.add("hidden");
    document.getElementById("videoContainer").classList.remove("hidden");
}, 60000);

</script>

</body>
</html>
