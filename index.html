<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Transmission Node</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff88;
    font-family: "Courier New", monospace;
    overflow: hidden;
}

/* Flash overlays */
.flash, .redflash {
    position: fixed;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
}
.flash { background: white; }
.redflash { background: red; z-index: 9998; }

/* Flicker */
@keyframes flicker {
    0% { opacity: 1; }
    10% { opacity: 0.3; }
    20% { opacity: 1; }
    30% { opacity: 0.4; }
    40% { opacity: 1; }
    100% { opacity: 1; }
}
.flicker {
    animation: flicker 2s infinite;
}

/* Glitch text */
@keyframes glitch {
    0% { text-shadow: 2px 0 red, -2px 0 blue; }
    50% { text-shadow: -2px 0 red, 2px 0 blue; }
    100% { text-shadow: 2px 0 red, -2px 0 blue; }
}
.glitch {
    font-size: 2.4rem;
    animation: glitch 1s infinite;
    text-align: center;
}

/* Layout */
.container {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Spinner */
.spinner {
    border: 6px solid rgba(0,255,136,0.2);
    border-top: 6px solid #00ff88;
    border-radius: 50%;
    width: 70px;
    height: 70px;
    animation: spin 1s linear infinite;
    margin: 40px 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Terminal */
.terminal {
    font-size: 1.1rem;
    margin-top: 20px;
    min-height: 120px;
    width: 70%;
    text-align: left;
}

/* Button */
button {
    background: black;
    color: #00ff88;
    border: 2px solid #00ff88;
    padding: 15px 30px;
    font-size: 1.2rem;
    cursor: pointer;
    margin-top: 30px;
    animation: glitch 1.5s infinite, flicker 3s infinite;
}
button:hover {
    background: #00ff88;
    color: black;
}

/* Video */
video {
    max-width: 80%;
    border: 2px solid #00ff88;
    box-shadow: 0 0 20px #00ff88;
}

/* Scanlines */
.scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(0,255,136,0.03) 3px
    );
    pointer-events: none;
}

.hidden { display: none; }
</style>
</head>
<body>

<div class="flash" id="flash"></div>
<div class="redflash" id="redflash"></div>
<div class="scanline"></div>

<div class="container" id="bootSequence">
    <div class="glitch">SECURE CHANNEL INITIALISING</div>
    <div class="spinner"></div>
    <div class="terminal" id="terminal"></div>
</div>

<div class="container hidden" id="buttonContainer">
    <div class="glitch">ENCRYPTED MESSAGE READY</div>
    <button id="viewBtn">Click to view secure message</button>
</div>

<div class="container hidden" id="videoContainer">
    <video id="missionVideo" controls>
        <source src="mission.mp4" type="video/mp4">
    </video>
</div>

<script>

// Flash intro
function introFlash() {
    const flash = document.getElementById("flash");
    const redflash = document.getElementById("redflash");

    setTimeout(() => flash.style.opacity = 1, 100);
    setTimeout(() => flash.style.opacity = 0, 250);

    setTimeout(() => flash.style.opacity = 1, 500);
    setTimeout(() => flash.style.opacity = 0, 650);

    setTimeout(() => redflash.style.opacity = 0.8, 900);
    setTimeout(() => redflash.style.opacity = 0, 1100);

    setTimeout(() => {
        document.body.classList.add("flicker");
    }, 1200);
}
introFlash();

// Terminal simulation
const messages = [
">>> Incoming override signal...",
">>> Establishing encrypted tunnel...",
">>> Generating session keys...",
">>> AES-256 handshake complete...",
">>> Secure visual protocol active..."
];

let terminal = document.getElementById("terminal");
let msgIndex = 0;
let charIndex = 0;

function typeWriter() {
    if (msgIndex < messages.length) {
        if (charIndex < messages[msgIndex].length) {
            terminal.innerHTML += messages[msgIndex].charAt(charIndex);
            charIndex++;
            setTimeout(typeWriter, 25);
        } else {
            terminal.innerHTML += "<br>";
            msgIndex++;
            charIndex = 0;
            setTimeout(typeWriter, 700);
        }
    }
}
setTimeout(typeWriter, 1500);

// After 25 sec → show button
setTimeout(() => {
    document.getElementById("bootSequence").classList.add("hidden");
    document.getElementById("buttonContainer").classList.remove("hidden");
}, 25000);

// Button click → show video + autoplay
document.getElementById("viewBtn").addEventListener("click", () => {
    document.getElementById("buttonContainer").classList.add("hidden");
    document.getElementById("videoContainer").classList.remove("hidden");
    const video = document.getElementById("missionVideo");
    video.play();
});

</script>

</body>
</html>
