<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Transmission Node</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff88;
    font-family: "Courier New", monospace;
    overflow: hidden;
}

/* FLASH OVERLAY */
.flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
}

.redflash {
    position: fixed;
    inset: 0;
    background: red;
    opacity: 0;
    pointer-events: none;
    z-index: 9998;
}

/* Flicker */
@keyframes flicker {
    0% { opacity: 1; }
    10% { opacity: 0.3; }
    20% { opacity: 1; }
    30% { opacity: 0.2; }
    40% { opacity: 1; }
    100% { opacity: 1; }
}
.flicker {
    animation: flicker 2s infinite;
}

/* Glitch text */
@keyframes glitch {
    0% { text-shadow: 2px 0 red, -2px 0 blue; }
    50% { text-shadow: -2px 0 red, 2px 0 blue; }
    100% { text-shadow: 2px 0 red, -2px 0 blue; }
}

.glitch {
    font-size: 2.5rem;
    animation: glitch 1s infinite;
    text-align: center;
}

/* Container */
.container {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Spinner */
.spinner {
    border: 6px solid rgba(0,255,136,0.2);
    border-top: 6px solid #00ff88;
    border-radius: 50%;
    width: 80px;
    height: 80px;
    animation: spin 1s linear infinite;
    margin: 40px 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.terminal {
    font-size: 1.1rem;
    margin-top: 20px;
    min-height: 160px;
    width: 70%;
    text-align: left;
}

video {
    max-width: 80%;
    border: 2px solid #00ff88;
    box-shadow: 0 0 20px #00ff88;
}

.hidden { display: none; }

/* Scanlines */
.scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(0,255,136,0.03) 3px
    );
    pointer-events: none;
}
</style>
</head>
<body>

<div class="flash" id="flash"></div>
<div class="redflash" id="redflash"></div>
<div class="scanline"></div>

<div class="container" id="bootSequence">
    <div class="glitch">SECURE CHANNEL INITIALISING</div>
    <div class="spinner"></div>
    <div class="terminal" id="terminal"></div>
</div>

<div class="container hidden" id="videoContainer">
    <div class="glitch">TRANSMISSION READY</div>
    <p>Agent authentication required. Press play.</p>
    <video controls>
        <source src="mission.mp4" type="video/mp4">
    </video>
</div>

<script>

// Aggressive startup flash
function introFlash() {
    const flash = document.getElementById("flash");
    const redflash = document.getElementById("redflash");

    setTimeout(() => flash.style.opacity = 1, 100);
    setTimeout(() => flash.style.opacity = 0, 250);

    setTimeout(() => flash.style.opacity = 1, 500);
    setTimeout(() => flash.style.opacity = 0, 650);

    setTimeout(() => redflash.style.opacity = 0.8, 900);
    setTimeout(() => redflash.style.opacity = 0, 1100);

    setTimeout(() => {
        document.body.classList.add("flicker");
    }, 1200);
}

introFlash();


// Long terminal simulation
const messages = [
">>> Incoming override signal...",
">>> Verifying node integrity...",
">>> Establishing encrypted tunnel...",
">>> Generating session keys...",
">>> AES-256 handshake initiated...",
">>> Routing via offshore relay...",
">>> Bypassing internal firewall...",
">>> Masking origin...",
">>> Switching to visual-only protocol...",
">>> Awaiting field agents...",
">>> Channel stabilising..."
];

let terminal = document.getElementById("terminal");
let msgIndex = 0;
let charIndex = 0;

function typeWriter() {
    if (msgIndex < messages.length) {
        if (charIndex < messages[msgIndex].length) {
            terminal.innerHTML += messages[msgIndex].charAt(charIndex);
            charIndex++;
            setTimeout(typeWriter, 25);
        } else {
            terminal.innerHTML += "<br>";
            msgIndex++;
            charIndex = 0;
            setTimeout(typeWriter, 800);
        }
    }
}

// Start typing after 2 sec
setTimeout(typeWriter, 2000);


// TOTAL DELAY BEFORE VIDEO (3 minutes)
setTimeout(() => {
    document.getElementById("bootSequence").classList.add("hidden");
    document.getElementById("videoContainer").classList.remove("hidden");
    document.body.classList.remove("flicker");
}, 180000); // 180000 ms = 3 minutter

</script>

</body>
</html>
